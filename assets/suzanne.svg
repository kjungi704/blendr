<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 224" width="256" height="224" role="img" aria-label="Suzanne, the blendr mascot">
  <!-- backdrop tile -->
  <rect x="0" y="0" width="256" height="224" rx="26" fill="#181818"/>

  <!-- ears -->
  <ellipse cx="44"  cy="120" rx="30" ry="40" fill="#B25A00"/>
  <ellipse cx="44"  cy="120" rx="15" ry="24" fill="#8A4500"/>
  <ellipse cx="212" cy="120" rx="30" ry="40" fill="#B25A00"/>
  <ellipse cx="212" cy="120" rx="15" ry="24" fill="#8A4500"/>

  <!-- head -->
  <path d="M128 26 C 78 26 56 60 56 104 C 56 158 86 198 128 198 C 170 198 200 158 200 104 C 200 60 178 26 128 26 Z" fill="#EA7600"/>
  <!-- top highlight -->
  <path d="M128 28 C 102 28 82 46 74 76 C 98 60 158 60 182 76 C 174 46 154 28 128 28 Z" fill="#FF9A3D"/>

  <!-- brow ridge -->
  <path d="M70 92 C 92 74 164 74 186 92 C 176 104 150 102 128 99 C 106 102 80 104 70 92 Z" fill="#B25A00"/>

  <!-- eyes -->
  <ellipse cx="100" cy="117" rx="22" ry="20" fill="#2A2A2A"/>
  <ellipse cx="156" cy="117" rx="22" ry="20" fill="#2A2A2A"/>
  <circle cx="100" cy="117" r="13" fill="#FFFFFF"/>
  <circle cx="156" cy="117" r="13" fill="#FFFFFF"/>
  <!-- gloriously cross-eyed pupils -->
  <circle cx="111" cy="119" r="6" fill="#101010"/>
  <circle cx="145" cy="119" r="6" fill="#101010"/>

  <!-- snout -->
  <path d="M92 150 C 110 138 146 138 164 150 C 160 178 96 178 92 150 Z" fill="#FF9A3D"/>
  <circle cx="118" cy="157" r="4" fill="#8A4500"/>
  <circle cx="138" cy="157" r="4" fill="#8A4500"/>
  <!-- dumb little mouth -->
  <path d="M112 170 q 16 11 32 0" stroke="#8A4500" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
